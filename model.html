<style>

<h1>🤖 Batch Job System — Objektmodell</h1>
<div class="version">Version 202604111930 | Generiert: 2026-04-11 19:30:31 | Auto-Update via Crontab</div>

<div class="grid">

  <div>
    <div class="card" id="card-class">
      <div class="card-header">

<script>
const diagrams = {
  class: `classDiagram
    %% ── Abstrakte Basen ──
    class ModelRunner {
        <<abstract>>
        +run(prompt, system_prompt, job_id, on_kill_check, max_iter, tools) RunResult
    }

    class JobPhase {
        <<abstract>>
        +name: str
        +max_iter(ctx) int
        +system_prompt(ctx) str
        +user_prompt(ctx) str
        +tools() list|None
        +on_complete(ctx, run) void
    }

    %% ── Pipeline-Phasen ──
    class PlannerPhase {
        +name = 'planner'
        +max_iter() 6
        +tools() []
    }

    class ExecutorPhase {
        +name = 'executor'
        +max_iter() step_count*3 + 2
    }

    class ReporterPhase {
        +name = 'reporter'
        +max_iter() 3
        +tools() []
    }

    JobPhase <|-- PlannerPhase
    JobPhase <|-- ExecutorPhase
    JobPhase <|-- ReporterPhase

    %% ── PhaseContext ──
    class PhaseContext {
        +job: JobRecord
        +plan_path: str
        +infra: str
        +plan: str
        +step_count: int
        +total_in: int
        +total_out: int
        +total_cache: int
        +total_cost: float
        +iters: int
    }

    %% ── Pipeline ──
    class JobPipeline {
        -_runner: ModelRunner
        -_infra: str
        -_repo: JobRepository
        -_phases: list[JobPhase]
        +run(job, on_kill_check) RunResult
        -_set_progress(job_id, bit) void
    }

    JobPipeline *-- PhaseContext
    JobPipeline *-- "3" JobPhase
    JobPipeline ..> ModelRunner

    %% ── Runner ──
    class OpenRouterRunner {
        +model_id: str
        +run(prompt, system_prompt, job_id, on_kill_check, max_iter, tools) RunResult
    }

    ModelRunner <|-- OpenRouterRunner
    OpenRouterRunner ..> OpenRouterHttpClient

    %% ── HTTP Client ──
    class OpenRouterHttpClient {
        +chat(model_id, messages, system_prompt, tools) dict
        +get_credits() dict
    }

    %% ── Repositories ──
    class JobRepository {
        -VALID_TRANSITIONS: dict
        +claim_next() JobRecord
        +transition_status(job_id, new_status, error_msg) bool
        +complete_job(job_id, run) RunResult
        +write_result(job_id, run) void
    }

    class ContextRepository {
        +get_context_blocks() tuple[str,str]
        +get_session_cache() str|None
    }

    %% ── Processor ──
    class JobProcessor {
        -_repo: JobRepository
        -_runners: dict
        -_context: ContextBuilder
        -_notifier: Notifier
        -_tracker: UsageTracker
        +process(job) void
        -_execute(job) RunResult
        -_enforce_quality(job, run) RunResult
        -_maybe_escalate(job, run) RunResult
    }

    JobProcessor ..> JobPipeline : _execute()
    JobProcessor ..> JobRepository
    JobProcessor ..> ContextBuilder

    %% ── Context ──
    class ContextBuilder {
        -_repo: ContextRepository
        +build_prompt(job) str
        +build_infra_context() str
        +system_prompt() str
    }

    ContextBuilder ..> ContextRepository

    %% ── Models ──
    class JobRecord {
        +id: int
        +model: str
        +prompt: str
        +targetdate: date
        +resume_session: bool
    }

    class RunResult {
        +result: str
        +status: str
        +error: str
        +in_tok: int
        +out_tok: int
        +cache_tok: int
        +cost: float
        +iters: int
    }

    JobPipeline ..> JobRecord
    JobPipeline ..> RunResult
    JobPhase ..> PhaseContext
    JobPhase ..> RunResult`,

  seq: `sequenceDiagram
    participant P as Poller<br>(batch-poller.py)
    participant JP as JobProcessor
    participant JR as JobRepository
    participant JB as JobPipeline
    participant PL as PlannerPhase
    participant EX as ExecutorPhase
    participant RP as ReporterPhase
    participant R as ModelRunner

    P->>JR: claim_next()
    JR-->>P: JobRecord

    P->>JP: process(job)

    JP->>JP: _execute(job)

    rect rgb(30,40,60)
        Note over JB,R: Pipeline.run() — drei Phasen

        JP->>JB: pipeline.run(job, on_kill)
        JB->>JB: _set_progress(job, bit=1)

        JB->>R: run(max_iter=6, tools=[])
        R-->>JB: RunResult (Plan-Datei)
        JB->>PL: on_complete(ctx, run)
        Note right of PL: Plan-Datei lesen,<br>step_count setzen

        rect rgb(40,50,30)
            JB->>JB: _set_progress(job, bit=4)
            JB->>R: run(max_iter=step*3+2, tools=[exec,delegate])
            R-->>JB: RunResult (Plan-Schritte abgearbeitet)
            JB->>EX: on_complete(ctx, run)
        end

        rect rgb(50,30,40)
            JB->>JB: _set_progress(job, bit=32)
            JB->>R: run(max_iter=3, tools=[])
            R-->>JB: RunResult (Bericht-Text)
            JB->>RP: on_complete(ctx, run)
            Note right of RP: Schreibt Bericht<br>direkt in DB
        end

        JB->>JB: _set_progress(job, bit=192)
        JB-->>JP: RunResult(status=done)
    end

    JP->>JP: _enforce_quality(job, run)
    JP->>JR: complete_job(job_id, run)
    JR-->>JP: RunResult (merged)
    JP-->>P: done/failed`,

  module: `graph TB
    subgraph batch["📦 /home/gh/batch/"]
        poller["batch-poller.py<br/><i>polling loop</i>"]
        processor["processor.py<br/><i>JobProcessor</i>"]
        pipeline["pipeline.py<br/><i>JobPipeline + Phasen</i><br/>JobPhase · PlannerPhase<br/>ExecutorPhase · ReporterPhase"]
        repository["repository.py<br/><i>JobRepository</i><br/>VALID_TRANSITIONS<br/>transition_status()"]
        context["context.py<br/><i>ContextBuilder</i><br/>build_infra_context()"]
        context_repo["context_repo.py<br/><i>ContextRepository</i><br/>get_context_blocks()<br/>get_session_cache()"]
        models["models.py<br/><i>JobRecord · RunResult</i>"]
        config["config.py<br/><i>ENV + DB Pool</i>"]

        subgraph runners["🏃 runners/"]
            base["base.py<br/><i>ModelRunner</i>"]
            openrouter["openrouter.py<br/><i>OpenRouterRunner</i>"]
            openrouter_http["openrouter_http.py<br/><i>OpenRouterHttpClient</i><br/>chat() · get_credits()"]
        end
    end

    poller --> processor
    processor --> pipeline
    processor --> repository
    processor --> context
    context --> context_repo
    processor --> openrouter
    openrouter --> base
    openrouter --> openrouter_http
    processor --> models
    pipeline --> models
    pipeline --> base
    repository --> config
    context_repo --> config
    openrunner_http --> config

    classDef mod fill:#1c2128,stroke:#58a6ff,color:#c9d1d9
    classDef sub fill:#0d1117,stroke:#30363d,color:#8b949e
    class poller,processor,pipeline,repository,context,context_repo,models,config,base,openrouter,openrouter_http mod`,

  flow: `flowchart TD
    A["🔄 Poller<br>batch-poller.py"] --> B{"Job in Queue?"}
    B -- "Nein" --> A
    B -- "Ja" --> C["claim_next()<br>SELECT FOR UPDATE"]

    C --> D["JobProcessor.process(job)"]
    D --> E["Pipeline.run()"]

    E --> F["📊 Planner Phase<br>max_iter=6, tools=[]"]
    F --> G["Runner.run() → Agent"]
    G --> H["Schreibt job-{id}.plan"]
    H --> I["on_complete: Plan lesen,<br>step_count setzen"]

    I --> J["⚡ Executor Phase<br>max_iter=step*3+2"]
    J --> K["Runner.run() → Agent<br>tools=[exec, delegate]"]
    K --> L{"Nächster offener<br>Schritt?"}
    L -- "Ja" --> M["Schritt ausführen"]
    M --> N["Plan aktualisieren<br>sed -i ..."]
    N --> K
    L -- "Alle [x]" --> O["on_complete"]

    O --> P["📝 Reporter Phase<br>max_iter=3, tools=[]"]
    P --> Q["Runner.run() → Agent<br>nur Text-Ausgabe"]
    Q --> R["Bericht in DB schreiben"]

    R --> S{"Quality Gate<br>≥400 Zeichen<br>≥2 ##-Abschnitte"}
    S -- "Bestanden" --> T["complete_job()<br>status=done"]
    S -- "Zu kurz" --> U["Requeue mit Feedback<br>→ neuer Job"]

    T --> V["tracker.record()"]
    V --> W["notifier.notify()"]
    W --> X["_update_session_cache()"]
    X --> A

    style F fill:#1a3a1a,stroke:#3fb950
    style J fill:#3a3a1a,stroke:#d4a017
    style P fill:#3a1a2a,stroke:#ff6b6b
    style S fill:#2a1a3a,stroke:#a06bd6
    style T fill:#1a3a3a,stroke:#58a6ff
    style U fill:#3a1a1a,stroke:#ff4444`
};

// Mermaid init
mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  themeVariables: {
    primaryColor: '#1c2128',
    primaryBorderColor: '#58a6ff',
    primaryTextColor: '#c9d1d9',
    lineColor: '#58a6ff',
    secondaryColor: '#161b22',
    tertiaryColor: '#0d1117',
    background: '#0d1117',
    mainBkg: '#1c2128',
    nodeBorder: '#58a6ff',
    clusterBkg: '#161b22',
    titleColor: '#c9d1d9',
    edgeLabelBackground: '#0d1117',
  },
  fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
  fontSize: 12,
  sequence: { useMaxWidth: true, actorFontSize: 11, messageFontSize: 11 },
  class: { useMaxWidth: true },
  flowchart: { useMaxWidth: true, htmlLabels: true },
});

async function renderAll() {
  for (const [key, code] of Object.entries(diagrams)) {
    const wrap = document.getElementById(`wrap-${key}`);
    try {
      const { svg } = await mermaid.render(`svg-${key}`, code.trim());
      wrap.innerHTML = svg;
      wrap.classList.remove('loading');
      const btn = document.querySelector(`[data-target="${key}"]`);
      if (btn) btn.disabled = false;
    } catch (e) {
      wrap.innerHTML = `<pre style="color:#ff6b6b;font-size:.75rem">${e.message}</pre>`;
      wrap.classList.remove('loading');
    }
  }
}

// Fullscreen
const overlay = document.getElementById('fs-overlay');
const viewport = document.getElementById('fs-viewport');
const inner = document.getElementById('fs-inner');
const label = document.getElementById('fs-label');
let scale = 1, tx = 0, ty = 0, dragging = false, dx0, dy0;

document.querySelectorAll('.fs-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.target;
    const src = document.getElementById(`wrap-${key}`);
    inner.innerHTML = src.innerHTML;
    label.textContent = btn.closest('.card').querySelector('.card-title').textContent;
    scale = 1; tx = ty = 0;
    updateTransform();
    overlay.classList.add('open');
  });
});

document.getElementById('fs-close').onclick = () => overlay.classList.remove('open');
document.addEventListener('keydown', e => { if (e.key === 'Escape') overlay.classList.remove('open'); });

document.getElementById('zoom-in').onclick = () => { scale = Math.min(scale * 1.2, 5); updateTransform(); };
document.getElementById('zoom-out').onclick = () => { scale = Math.max(scale / 1.2, 0.1); updateTransform(); };
document.getElementById('zoom-reset').onclick = () => { scale = 1; tx = ty = 0; updateTransform(); };

viewport.addEventListener('wheel', e => {
  e.preventDefault();
  scale *= e.deltaY < 0 ? 1.1 : 0.9;
  scale = Math.max(0.1, Math.min(5, scale));
  updateTransform();
}, { passive: false });

viewport.addEventListener('mousedown', e => { dragging = true; dx0 = e.clientX - tx; dy0 = e.clientY - ty; viewport.classList.add('grabbing'); });
window.addEventListener('mousemove', e => { if (!dragging) return; tx = e.clientX - dx0; ty = e.clientY - dy0; updateTransform(); });
window.addEventListener('mouseup', () => { dragging = false; viewport.classList.remove('grabbing'); });

function updateTransform() {
  inner.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}

renderAll();
</script>
</body>
</html>
